<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Presupuesto - C.G. Programación Web</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">
                <a href="../index.html">
                    <img src="../assets/icons/logo.png" alt="Logo" width="45" height="45">
                    <span>C.G. PROGRAMACIÓN WEB</span>
                </a>
            </div>
            <nav class="nav">
                <a href="../index.html">Inicio</a>
                <a href="galeria.html">Galería</a>
                <a href="presupuesto.html" class="active">Presupuesto</a>
                <a href="contacto.html">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1>Presupuesto Estimado</h1>
        <form id="formPresupuesto">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellidos" placeholder="Apellidos" required>
            <input type="tel" id="telefono" placeholder="Teléfono (9 dígitos)" required>
            <input type="email" id="email" placeholder="Email" required>
            
            <select id="producto" required>
                <option value="0">Seleccione servicio (Obligatorio)</option>
                <option value="500">Web Estándar - 500€</option>
                <option value="1200">Tienda Online - 1200€</option>
                <option value="800">Web Corporativa - 800€</option>
            </select>

            <label for="plazo">Plazo de entrega (meses):</label>
            <input type="number" id="plazo" min="1" value="1">

            <div style="margin: 15px 0;">
                <label><input type="checkbox" id="extra1"> SEO (+50€)</label><br>
                <label><input type="checkbox" id="extra2"> Hosting (+100€)</label>
            </div>

            <div style="margin-bottom: 15px;">
                <label><input type="checkbox" id="privacidad" required> Acepto política de privacidad</label>
            </div>

            <div style="background: #eee; padding: 20px; border-radius: 8px; margin-bottom: 10px;">
                Total: <span id="total">0</span>€
            </div>
            <button type="submit" id="btnEnviar">Solicitar Presupuesto</button>
        </form>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="social-icons">
                <a href="https://www.facebook.com/cgprogramacion" target="_blank">
                    <img src="../assets/icons/facebook.png" alt="Facebook" width="30" height="30">
                </a>
                <a href="https://www.instagram.com/cgprogramacion" target="_blank">
                    <img src="../assets/icons/instagram.png" alt="Instagram" width="30" height="30">
                </a>
            </div>
            <p><strong>C.G. Programación Web</strong> - Claudia González Aparicio</p>
        </div>
    </footer>
    <script src="../js/presupuesto.js"></script>
</body>
</html>
