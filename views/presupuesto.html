<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto - C.G. Programación Web</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">
                <a href="../index.html">
                    <img src="../assets/icons/logo.png" alt="Logo">
                    <span>C.G. PROGRAMACIÓN WEB</span>
                </a>
            </div>
            <nav class="nav">
                <a href="../index.html">Inicio</a>
                <a href="galeria.html">Galería</a>
                <a href="presupuesto.html" class="active">Presupuesto</a>
                <a href="contacto.html">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1>Presupuesto Estimado</h1>
        <form id="formPresupuesto">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellidos" placeholder="Apellidos" required>
            <input type="email" id="email" placeholder="Email" required>
            <select id="producto">
                <option value="0">Seleccione servicio</option>
                <option value="500">Web Estándar - 500€</option>
                <option value="1200">Tienda Online - 1200€</option>
            </select>
            <input type="number" id="plazo" placeholder="Meses de plazo" min="1" value="1">
            <div style="margin: 10px 0;">
                <label><input type="checkbox" id="extra1" value="50"> SEO (+50€)</label><br>
                <label><input type="checkbox" id="extra2" value="100"> Hosting (+100€)</label>
            </div>
            <div style="background: #eee; padding: 20px; border-radius: 8px;">
                Total: <span id="total">0</span>€
            </div>
            <button type="submit">Solicitar</button>
        </form>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="social-icons">
                <a href="#"><img src="../assets/icons/facebook.png" alt="Facebook"></a>
                <a href="#"><img src="../assets/icons/instagram.png" alt="Instagram"></a>
            </div>
            <p>C.G. Programación Web - Claudia González Aparicio</p>
        </div>
    </footer>
    <script src="../js/presupuesto.js"></script>
</body>
</html>
